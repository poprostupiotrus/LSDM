version: '3.9'

services:
  db:
    image: postgres:15
    container_name: lsdm-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data


  backend:
    build:
      context: ./LSDM.Backend
      dockerfile: Dockerfile
    container_name: lsdm-backend
    depends_on:
      - db
    environment:
      ConnectionStrings__DefaultConnection: "Server=db;Database=${POSTGRES_DB};User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};"


  ragemp:
    build:
      context: ./LSDM.Server      
      dockerfile: Dockerfile
    container_name: lsdm-ragemp
    depends_on:
      - backend
    ports:
      - "22005:22005"

volumes:
  db_data: