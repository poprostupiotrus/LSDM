version: '3.9'

services:
  db:
    image: postgres:15
    container_name: lsdm-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s


  backend:
    build:
      context: ./LSDM.Backend
      dockerfile: Dockerfile
    container_name: lsdm-backend
    environment:
      ConnectionStrings__DefaultConnection: "Server=db;Database=${POSTGRES_DB};User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s


  ragemp:
    build:
      context: ./LSDM.Server
      dockerfile: Dockerfile
    container_name: lsdm-ragemp
    ports:
      - "22005:22005"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db_data: